name: Enterprise Integration CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate XML Syntax
        run: |
          find integration -name "*.xml" -type f -exec xmllint --noout {} +
        
  build-and-scan:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build Carbon Application (CAR)
        run: |
          # Placeholder for Maven build command once pom.xml is created via Integration Studio
          echo "Building CAR file... mvn clean install -Dmaven.test.skip=true"
          mkdir -p IntegrationProjectCompositeExporter/target/
          touch IntegrationProjectCompositeExporter/target/EnterpriseIntegrationHub_1.0.0.car

      - name: Build Docker Image
        run: |
          docker build -t perera1325/enterprise-integration-hub:${{ github.sha }} -f docker/Dockerfile .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'perera1325/enterprise-integration-hub:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
