[server]
hostname = "test.integration.enterprise.internal"
node_ip = "$SYSTEM:POD_IP"

# TEST Data Source Configuration
[[data_source]]
id = "WSO2_HUB_DB"
url = "$SYSTEM:SYSTEM_DB_URL"
username = "$SYSTEM:SYSTEM_DB_USER"
password = "$SYSTEM:SYSTEM_DB_PASSWORD"
driver = "org.postgresql.Driver"

[keystore.tls]
file_name = "test-tls.jks"
type = "JKS"
password = "$SYSTEM:KEYSTORE_PASSWORD"
alias = "test-cert"
key_password = "$SYSTEM:KEYSTORE_PASSWORD"

# TEST: INFO Level
[logger.synapse_wire]
level = "INFO"
name = "org.apache.synapse.transport.http.wire"
